<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New proposal for your request</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #1A1A1A;
            -webkit-font-smoothing: antialiased;
        }

        .h1 {
            font-size: 48px;
            font-weight: 900;
            line-height: 0.95;
            letter-spacing: -0.04em;
            color: #1A1A1A;
            margin: 0 0 24px 0;
        }

        @media only screen and (max-width: 600px) {
            .h1 {
                font-size: 36px !important;
            }
            .content-padding {
                padding: 24px 20px !important;
            }
        }
    </style>
</head>
<body style="margin: 0; padding: 0; background-color: #ffffff; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; color: #1A1A1A;">
    <table border="0" cellpadding="0" cellspacing="0" width="100%" style="background-color: #ffffff;">
        <tr>
            <td align="center" class="content-padding" style="padding: 60px 40px;">
                <table border="0" cellpadding="0" cellspacing="0" width="100%" style="max-width: 600px;">
                    <tr>
                        <td align="left" style="padding-bottom: 60px;">
                            <table border="0" cellpadding="0" cellspacing="0">
                                <tr>
                                    <td style="vertical-align: middle;">
                                        <img src="https://onseek.co/logonseek.svg" alt="Onseek" width="32" style="display: block; border: 0;">
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>

                    <!-- Hero Title -->
                    <tr>
                        <td align="left">
                            <h1 class="h1">
                                New proposal <br>received. 🔔
                            </h1>
                            <p style="font-size: 19px; line-height: 1.5; color: #6B7280; margin: 0 0 40px 0; font-weight: 500; letter-spacing: -0.01em;">
                                A seller has just responded to your request. They have submitted a proposal that matches your criteria.
                            </p>
                        </td>
                    </tr>

                    <!-- Proposal Highlight Card -->
                    <tr>
                        <td align="left">
                            <div style="background-color: #F5F3FF; border-radius: 24px; padding: 32px; margin-bottom: 48px;">
                                <table border="0" cellpadding="0" cellspacing="0" width="100%">
                                    <tr>
                                        <td>
                                            <div style="font-size: 12px; font-weight: 800; color: #7755FF; text-transform: uppercase; letter-spacing: 0.1em; padding-bottom: 12px;">
                                                Proposal for
                                            </div>
                                            <div style="font-size: 24px; font-weight: 700; color: #1A1A1A; line-height: 1.2; padding-bottom: 24px; letter-spacing: -0.02em;">
                                                [title]
                                            </div>
                                            <div style="border-top: 1px solid rgba(119, 85, 255, 0.1); padding-top: 24px;">
                                                <div style="font-size: 32px; font-weight: 900; color: #1A1A1A; letter-spacing: -0.04em;">
                                                    [price]
                                                </div>
                                                <div style="font-size: 11px; color: #7755FF; opacity: 0.6; font-weight: 800; text-transform: uppercase; margin-top: 4px; letter-spacing: 0.05em;">
                                                    Proposed Price
                                                </div>
                                            </div>
                                        </td>
                                    </tr>
                                </table>
                            </div>
                        </td>
                    </tr>

                    <!-- CTA -->
                    <tr>
                        <td align="left" style="padding-bottom: 80px;">
                            <table border="0" cellpadding="0" cellspacing="0" width="100%">
                                <tr>
                                    <td align="left">
                                        <table border="0" cellpadding="0" cellspacing="0">
                                            <tr>
                                                <td align="center" bgcolor="#7755FF" style="border-radius: 9999px;">
                                                    <a href="[url]" target="_blank" style="display: inline-block; padding: 20px 40px; font-size: 16px; font-weight: 800; color: #ffffff; text-decoration: none; border-radius: 9999px; letter-spacing: -0.01em;">
                                                        Review proposal now
                                                    </a>
                                                </td>
                                            </tr>
                                        </table>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>

                    <!-- Footer -->
                    <tr>
                        <td align="center" style="padding-top: 48px; border-top: 1px solid #F3F4F6;">
                            <p style="font-size: 12px; color: #9CA3AF; margin: 0 0 12px 0; font-weight: 500;">
                                &copy; 2026 Onseek. All rights reserved.
                            </p>
                            <p style="font-size: 11px; color: #D1D5DB; margin: 0;">
                                stop receiving these emails. <a href="#" style="color: #D1D5DB; text-decoration: underline;">unsubscribe</a>.
                            </p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
